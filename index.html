<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Key Ideas</title>
    <style>
      :root {
        color-scheme: light;
        --bg: oklch(98% 0 0);
        --panel: oklch(95% 0 0);
        --line: oklch(82% 0 0);
        --text: oklch(18% 0 0);
        --muted: oklch(44% 0 0);
        --selected: oklch(90% 0 0);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      .app {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        min-height: 100vh;
      }

      .list {
        border-right: 1px solid var(--line);
        background: var(--panel);
      }

      .top {
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.2;
      }

      .count,
      .meta,
      .empty,
      .status {
        color: var(--muted);
        font-size: 12px;
      }

      .videos {
        display: flex;
        flex-direction: column;
      }

      .video {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 12px;
        width: 100%;
        padding: 12px 16px;
        border: 0;
        border-bottom: 1px solid var(--line);
        background: transparent;
        color: inherit;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }

      .video:hover,
      .video[aria-current="true"] {
        background: var(--selected);
      }

      .video img {
        width: 112px;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
        background: oklch(88% 0 0);
      }

      .video-title {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
        overflow: hidden;
        font-weight: 600;
      }

      .reader {
        min-width: 0;
        padding: 28px;
      }

      .reader-inner {
        max-width: 820px;
      }

      .hero {
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
        margin-bottom: 24px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      .hero img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        background: oklch(88% 0 0);
      }

      h2 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }

      a {
        color: var(--text);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .summary h1,
      .summary h2,
      .summary h3 {
        margin: 22px 0 10px;
        font-size: 16px;
        line-height: 1.3;
      }

      .summary p {
        margin: 0 0 12px;
      }

      .summary ul,
      .summary ol {
        margin: 0 0 14px;
        padding-left: 22px;
      }

      .summary li {
        margin-bottom: 8px;
      }

      .summary blockquote {
        margin: 12px 0;
        padding: 10px 12px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .empty {
        padding: 16px;
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }

        .list {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .reader {
          padding: 18px 16px;
        }

        .hero {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="list">
        <div class="top">
          <h1>YouTube Key Ideas</h1>
          <div class="count" id="count">Loading</div>
        </div>
        <div class="videos" id="videos"></div>
      </aside>
      <section class="reader">
        <div class="reader-inner" id="reader">
          <p class="status">Select a saved video.</p>
        </div>
      </section>
    </main>

    <script src="/marked.umd.js"></script>
    <script>
      const videosEl = document.getElementById("videos");
      const countEl = document.getElementById("count");
      const readerEl = document.getElementById("reader");
      let selectedId = null;

      function sanitize(html) {
        const allowedTags = new Set([
          "A", "BLOCKQUOTE", "BR", "CODE", "EM", "H1", "H2", "H3", "H4",
          "H5", "H6", "HR", "LI", "OL", "P", "PRE", "STRONG", "UL",
        ]);
        const template = document.createElement("template");
        template.innerHTML = html;

        for (const element of [...template.content.querySelectorAll("*")]) {
          if (!allowedTags.has(element.tagName)) {
            element.replaceWith(...element.childNodes);
            continue;
          }

          for (const attr of [...element.attributes]) {
            if (element.tagName !== "A" || attr.name !== "href") {
              element.removeAttribute(attr.name);
            }
          }

          if (element.tagName === "A") {
            const href = element.getAttribute("href") || "";
            if (!/^https?:\/\//i.test(href)) {
              element.removeAttribute("href");
            } else {
              element.setAttribute("target", "_blank");
              element.setAttribute("rel", "noreferrer");
            }
          }
        }

        return template.innerHTML;
      }

      function formatDate(value) {
        if (!value) return "";
        return new Intl.DateTimeFormat(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
        }).format(new Date(value));
      }

      function getMarkdownParser() {
        const library = globalThis.marked;
        if (!library) return null;
        if (typeof library.parse === "function") return library.parse.bind(library);
        if (typeof library.marked === "function") return library.marked.bind(library);
        return null;
      }

      function renderMarkdown(text) {
        const parse = getMarkdownParser();
        if (!parse) {
          return '<p class="status">Markdown parser failed to load.</p>';
        }

        return sanitize(parse(text || "", { gfm: true, breaks: true }));
      }

      function renderList(items) {
        countEl.textContent = `${items.length} saved`;
        videosEl.textContent = "";

        if (!items.length) {
          videosEl.innerHTML = '<p class="empty">No saved videos yet.</p>';
          return;
        }

        for (const item of items) {
          const button = document.createElement("button");
          button.className = "video";
          button.type = "button";
          button.dataset.videoId = item.videoId;
          button.setAttribute("aria-current", item.videoId === selectedId ? "true" : "false");
          button.innerHTML = `
            <img src="${item.thumbnail}" alt="" loading="lazy" />
            <span>
              <span class="video-title"></span>
              <span class="meta">${formatDate(item.createdAt)}</span>
            </span>
          `;
          button.querySelector(".video-title").textContent = item.title;
          button.addEventListener("click", () => loadSummary(item.videoId));
          videosEl.appendChild(button);
        }

        if (!selectedId) loadSummary(items[0].videoId);
      }

      async function loadSummary(videoId) {
        selectedId = videoId;
        for (const button of videosEl.querySelectorAll(".video")) {
          button.setAttribute("aria-current", button.dataset.videoId === videoId ? "true" : "false");
        }

        readerEl.innerHTML = '<p class="status">Loading summary.</p>';
        const response = await fetch(`/summaries/${videoId}`);
        const body = await response.json();
        if (!response.ok || !body.ok) {
          readerEl.innerHTML = '<p class="status">Could not load summary.</p>';
          return;
        }

        const item = body.summary;
        readerEl.innerHTML = `
          <div class="hero">
            <img src="${item.thumbnail}" alt="" />
            <div>
              <h2></h2>
              <div class="meta">${formatDate(item.createdAt)} · ${item.transcriptLength || 0} transcript chars</div>
              <p><a href="${item.url}" target="_blank" rel="noreferrer">Open on YouTube</a></p>
            </div>
          </div>
          <article class="summary">${renderMarkdown(item.keyIdeas)}</article>
        `;
        readerEl.querySelector("h2").textContent = item.title;
      }

      async function init() {
        try {
          const response = await fetch("/summaries");
          const body = await response.json();
          renderList(body.summaries || []);
        } catch {
          countEl.textContent = "Offline";
          videosEl.innerHTML = '<p class="empty">Could not load saved videos.</p>';
        }
      }

      init();
    </script>
  </body>
</html>
